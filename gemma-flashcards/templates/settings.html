{% extends "base.html" %}
{% block title %}Settings | Gemma Learning{% endblock %}
{% block content %}
<section class="panel">
  <h1>Settings</h1>
  <p class="muted">Choose your target language and goals. You can change these later in Settings.</p>
  <form method="post" class="form-grid">
    <label>Target language
      <select name="target_language" required>
        {% for lang in languages %}
        <option value="{{ lang }}" {% if profile.target_language == lang %}selected{% endif %}>{{ lang }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Native / explanation language
      <select name="native_language" required>
        {% for lang in languages %}
        <option value="{{ lang }}" {% if profile.native_language == lang %}selected{% endif %}>{{ lang }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Level (optional)
      <select name="level">
        <option value="">Not sure yet</option>
        {% for value, label in levels %}
        <option value="{{ value }}" {% if profile.level == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Learning goal
      <select name="goal">
        <option value="">Choose one</option>
        {% for value, label in goals %}
        <option value="{{ value }}" {% if profile.goal == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit" name="action" value="save" class="primary">Save settings</button>
    <button type="submit" name="action" value="regenerate_roadmap" class="secondary">Regenerate roadmap</button>
  </form>
  <p class="muted" style="margin-top: 16px;">
    Not sure of your level?
    <a href="{{ url_for('main.placement') }}">Take placement test</a>
    · <a href="{{ url_for('main.roadmap_view') }}">View roadmap</a>
  </p>
</section>
{% endblock %}
