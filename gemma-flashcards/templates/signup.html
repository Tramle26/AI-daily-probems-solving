{% extends "base.html" %}
{% block title %}Sign up | Gemma Learning{% endblock %}
{% block content %}
<section class="panel auth-panel">
  <h1>Create your account</h1>
  <p class="muted">Sign up to keep your decks, reviews, and roadmap private.</p>

  <form method="post" class="form-grid auth-form">
    <label>Display name <span class="muted">(optional)</span>
      <input type="text" name="display_name" autocomplete="nickname" maxlength="64" />
    </label>
    <label>Email
      <input type="email" name="email" required autocomplete="email" />
    </label>
    <label>Password
      <input type="password" name="password" required minlength="8" autocomplete="new-password" />
    </label>
    <label>Confirm password
      <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password" />
    </label>
    <button type="submit" class="primary">Sign up</button>
  </form>

  <p class="muted" style="margin-top: 16px;">
    Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
  </p>
</section>
{% endblock %}
